# /etc/nginx/sites-available/thchat.conf
# สร้าง symlink: sudo ln -s /etc/nginx/sites-available/thchat.conf /etc/nginx/sites-enabled/

upstream thchat_app {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name thchat.com www.thchat.com;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name thchat.com www.thchat.com;

    # SSL (Certbot จะเติมส่วนนี้อัตโนมัติ)
    # ssl_certificate /etc/letsencrypt/live/thchat.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/thchat.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Static files (Next.js _next/static) — cache นาน
    location /_next/static/ {
        proxy_pass http://thchat_app;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Socket.io — ต้องการ WebSocket upgrade
    location /socket.io/ {
        proxy_pass http://thchat_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;    # 24h สำหรับ long-lived connections
        proxy_send_timeout 86400;
    }

    # All other requests
    location / {
        proxy_pass http://thchat_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 60;
        client_max_body_size 10M;   # สำหรับ upload รูป
    }
}
