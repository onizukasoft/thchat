<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="512" height="512" rx="120" fill="url(#shine)"/>

  <!-- Speech bubble body -->
  <rect x="88" y="88" width="336" height="252" rx="56" fill="white"/>
  <!-- Bubble tail (bottom-left) -->
  <path d="M 150 340 L 94 456 L 248 340 Z" fill="white"/>

  <!-- Three typing dots: purple → violet → pink -->
  <circle cx="174" cy="214" r="34" fill="#7c3aed"/>
  <circle cx="256" cy="214" r="34" fill="#a855f7"/>
  <circle cx="338" cy="214" r="34" fill="#db2777"/>
</svg>
